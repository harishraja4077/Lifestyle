<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | Stackly</title>

<link rel="stylesheet" href="css/signup.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="bg-animation">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

<div class="signup-container">

<div class="signup-left">

<a href="index.html"><img src="./assets/logo.webp" alt="Stackly Logo" style="height: 40px; width: auto; vertical-align: middle; filter: brightness(0) invert(1);"></a>
<h1>Join Stackly</h1>

<p>
Create your account and start your healthy lifestyle today.
</p>

<img src="./assets/signup.webp"
alt="health">

</div>

<div class="signup-right">

<form id="signupForm">

<h2>Create Account</h2>


<select id="role" required>

<option value="">Select Role</option>

<option value="user">User</option>

<option value="admin">Admin</option>

</select>

<input
type="text"
placeholder="Full Name"
required>

<input
type="email"
placeholder="Email Address"
required>

<div class="password-box">
    

<input
type="password"
id="signupPassword"
placeholder="Password"
required>

<i
class="fas fa-eye"
onclick="toggleSignupPassword()">
</i>

</div>

<div class="password-box">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

<i
class="fas fa-eye"
onclick="toggleConfirmPassword()">
</i>

</div>

<button type="submit">
Create Account
</button>

<p class="bottom-text">
Already have an account?
<a href="login.html">Login</a>
</p>

</form>

</div>

</div>

<script src="js/main.js"></script>

</body>
</html>
